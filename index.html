<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤠 CowMathBoy</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#1a0a00;
  font-family:'Fredoka One','Arial Rounded MT Bold',cursive;
}
body {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:8px;
}
#wrap {
  position:relative;
  width:100%; max-width:780px;
}
canvas { display:block; width:100%; height:auto; touch-action:manipulation; }

/* ── Portrait / rotate overlay ── */
#rotateOverlay {
  display:none;
  position:fixed; inset:0; z-index:999;
  background:#1a0800;
  flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:30px;
}
@media (orientation: portrait) {
  #rotateOverlay { display:flex; }
}
#rotateCanvas { width:min(280px,80vw); height:auto; display:block; margin:0 auto 18px; }
#rotateMsg {
  font-family:'Rye',serif; font-size:clamp(18px,5vw,28px);
  color:#FFD700; margin-bottom:10px;
  text-shadow:2px 2px 0 #5a2a00;
}
#rotateHint {
  font-size:clamp(13px,3.5vw,18px); color:#FFE4B5; line-height:1.5;
}
.rotate-icon { font-size:clamp(36px,10vw,54px); animation:rotatePhone 1.6s ease-in-out infinite; display:inline-block; }
@keyframes rotatePhone {
  0%,100%{transform:rotate(0deg)} 40%{transform:rotate(90deg)} 60%{transform:rotate(90deg)}
}

/* ── Game UI ── */
#ui {
  position:absolute; top:0; left:0; right:0; bottom:0;
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  pointer-events:none; z-index:10;
}
#answers {
  display:grid; grid-template-columns:1fr 1fr;
  gap:clamp(6px,2vw,14px); pointer-events:all; margin-top:8px;
  width:clamp(260px,60%,500px);
}
.abtn {
  font-family:'Fredoka One',cursive;
  font-size:clamp(18px,3.5vw,28px); padding:clamp(8px,2vw,14px) clamp(12px,2.5vw,30px);
  background:#8B4513; color:#FFE4B5;
  border:4px solid #5C2E00;
  border-radius:10px; cursor:pointer;
  box-shadow:4px 4px 0 #3a1a00;
  transition:transform .08s, box-shadow .08s, background .1s;
  min-width:100px; text-align:center;
}
.abtn:hover { background:#a05020; transform:translate(-2px,-2px); box-shadow:6px 6px 0 #3a1a00; }
.abtn:active { transform:translate(2px,2px); box-shadow:2px 2px 0 #3a1a00; }
.abtn.correct { background:#3a8a1a; border-color:#1a5a00; animation:popIn .3s; }
.abtn.wrong   { background:#aa2010; border-color:#7a0000; animation:shake .3s; }
@keyframes popIn { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }

#msgOverlay {
  position:absolute; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.72);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:20; pointer-events:all;
}
#msgBox {
  background:#2a1200; border:6px solid #c8860a;
  border-radius:18px; padding:clamp(16px,3vw,30px) clamp(20px,4vw,40px);
  text-align:center; max-width:90%;
  box-shadow:0 0 0 3px #2a1200, 0 0 0 8px rgba(200,134,10,0.2);
}
#msgTitle { font-family:'Rye',serif; font-size:clamp(18px,4vw,30px); color:#FFD700; margin-bottom:10px; text-shadow:2px 2px 0 #5a2a00; }
#msgSub   { font-size:clamp(13px,2.5vw,18px); color:#FFE4B5; margin-bottom:16px; line-height:1.5; white-space:pre-line; }
#msgBtn {
  font-family:'Fredoka One',cursive;
  font-size:clamp(14px,2.5vw,20px); padding:10px 28px;
  background:#c8860a; color:#1a0800;
  border:4px solid #8a5a00; border-radius:10px;
  cursor:pointer; box-shadow:4px 4px 0 #5a3a00;
  transition:transform .08s, box-shadow .08s;
}
#msgBtn:hover { transform:translate(-2px,-2px); box-shadow:6px 6px 0 #5a3a00; }
#msgBtn:active { transform:translate(2px,2px); box-shadow:2px 2px 0 #5a3a00; }
#tinfo {
  background:#1a0800; border:2px solid #4a2a00;
  font-size:clamp(9px,1.8vw,11px); color:#8a5a20;
  text-align:center; padding:5px;
  font-family:'Fredoka One',cursive; letter-spacing:1px;
}
</style>
</head>
<body>
<!-- ── Portrait / rotate overlay ── -->
<div id="rotateOverlay">
  <canvas id="rotateCanvas" width="280" height="200"></canvas>
  <div id="rotateMsg">¡Gira la pantalla! 🤠</div>
  <div id="rotateHint">CowMathBoy se juega<br>en modo horizontal<br><span class="rotate-icon">📱</span></div>
</div>

<div id="wrap">
  <canvas id="cv" width="780" height="360"></canvas>
  <!-- Answer buttons overlay -->
  <div id="ui">
    <div id="answers">
      <button class="abtn" id="a0">?</button>
      <button class="abtn" id="a1">?</button>
      <button class="abtn" id="a2">?</button>
      <button class="abtn" id="a3">?</button>
    </div>
  </div>
  <!-- Message overlay -->
  <div id="msgOverlay">
    <div id="msgBox">
      <div id="msgTitle">YEEHAW!</div>
      <div id="msgSub">Texto</div>
      <button id="msgBtn">¡Vamos!</button>
    </div>
  </div>
  <div id="tinfo">Tablas activas: × 1 × 2</div>
</div>

<script>
const cv=document.getElementById('cv');
const cx=cv.getContext('2d');
const W=780, H=360;

// ── State ───────────────────────────────────────
let gs='start'; // start|playing|question|feedback|levelDone|gameOver|win
let lv=1, lives=3, score=0, frame=0, scroll=0;
let q=null, qAnswered=false;
let correct=0; const NEED=5;
let feedback={active:false,correct:false,timer:0,chosen:-1};
let parts=[];
let horseAnim=0;
let horseLaughing=0; // >0 = frames left laughing
let lastWrong=0, levelWrong=0;

// ── Rotate canvas horse ───────────────────────────
const rc=document.getElementById('rotateCanvas');
const rx2=rc.getContext('2d');
function drawRotateHorse(){
  rx2.clearRect(0,0,280,200);
  const t=Date.now()/1000;
  // Simple cute horse facing right, asking to rotate
  const x=140, y=150;
  // Shadow
  rx2.fillStyle='rgba(0,0,0,0.18)';
  rx2.beginPath(); rx2.ellipse(x,y+4,32,6,0,0,6.28); rx2.fill();
  // Legs bounce
  const lb=Math.sin(t*3)*6;
  rx2.fillStyle='#5a3000';
  for(const lx of [-18,-6,6,18]){
    rx2.fillRect(x+lx-3,y-20+Math.abs(lb),6,20);
    rx2.fillStyle='#3a1a00'; rx2.fillRect(x+lx-4,y-4,8,5); rx2.fillStyle='#5a3000';
  }
  // Body
  rx2.fillStyle='#8B4513';
  rx2.beginPath(); rx2.ellipse(x,y-28,38,18,0,0,6.28); rx2.fill();
  rx2.fillStyle='#a05020';
  rx2.beginPath(); rx2.ellipse(x-5,y-32,30,14,0,0,6.28); rx2.fill();
  // Neck
  rx2.fillStyle='#8B4513';
  rx2.beginPath(); rx2.moveTo(x+22,y-40); rx2.lineTo(x+32,y-58); rx2.lineTo(x+40,y-54); rx2.lineTo(x+30,y-36); rx2.fill();
  // Head
  rx2.fillStyle='#8B4513';
  rx2.beginPath(); rx2.ellipse(x+46,y-62,16,10,0.2,0,6.28); rx2.fill();
  // Snout
  rx2.fillStyle='#a05020';
  rx2.beginPath(); rx2.ellipse(x+58,y-58,9,7,0,0,6.28); rx2.fill();
  // Mouth open (asking)
  rx2.fillStyle='#3a1000';
  rx2.beginPath(); rx2.ellipse(x+62,y-54,5,4,0,0,6.28); rx2.fill();
  // Teeth
  rx2.fillStyle='#fff';
  rx2.fillRect(x+58,y-57,4,4); rx2.fillRect(x+63,y-57,4,4);
  // Eye (winking / big)
  rx2.fillStyle='#fff'; rx2.beginPath(); rx2.ellipse(x+44,y-67,5,5,0,0,6.28); rx2.fill();
  rx2.fillStyle='#1a0a00'; rx2.beginPath(); rx2.ellipse(x+45,y-67,3,3,0,0,6.28); rx2.fill();
  rx2.fillStyle='#fff'; rx2.fillRect(x+45,y-69,2,2);
  // Ear
  rx2.fillStyle='#7a3a00';
  rx2.beginPath(); rx2.moveTo(x+36,y-68); rx2.lineTo(x+40,y-80); rx2.lineTo(x+46,y-68); rx2.fill();
  // Mane
  rx2.fillStyle='#5a2a00';
  for(let i=0;i<4;i++){ rx2.beginPath(); rx2.arc(x+24+i*4,y-54-i*3,5,0,6.28); rx2.fill(); }
  // Tail
  rx2.strokeStyle='#6b3a00'; rx2.lineWidth=5;
  rx2.beginPath(); rx2.moveTo(x-38,y-28); rx2.quadraticCurveTo(x-58,y-8,x-52,y+12); rx2.stroke();
  // Phone icon pointing right
  rx2.fillStyle='#FFD700'; rx2.font="bold 14px 'Fredoka One',cursive";
  rx2.textAlign='center'; rx2.fillText('¡Gírame! →',x,18);
  requestAnimationFrame(drawRotateHorse);
}
drawRotateHorse();

// ── Tables ──────────────────────────────────────
function getTables(l){
  if(l<=2)  return [1,2,3];
  if(l<=4)  return [2,3,4];
  if(l<=6)  return [3,4,5];
  if(l<=8)  return [4,5,6];
  if(l<=10) return [5,6,7];
  if(l<=13) return [6,7,8];
  if(l<=16) return [7,8,9];
  return [8,9,10];
}

function mkQ(l){
  const t=getTables(l);
  const a=t[Math.random()*t.length|0];
  const b=1+(Math.random()*10|0);
  const ans=a*b;
  // Generate 3 wrong answers (distinct, plausible, 1-100)
  const wrongs=new Set();
  while(wrongs.size<3){
    let w;
    const r=Math.random();
    if(r<0.4) w=ans+([-1,1,2,-2,10,-10][Math.random()*6|0]);
    else if(r<0.7) w=a*(b+(Math.random()<0.5?1:-1));
    else w=t[Math.random()*t.length|0]*(1+(Math.random()*10|0));
    if(w!==ans && w>=1 && w<=100) wrongs.add(w);
  }
  const opts=[ans,...wrongs];
  // Shuffle
  for(let i=opts.length-1;i>0;i--){const j=Math.random()*i|0;[opts[i],opts[j]]=[opts[j],opts[i]];}
  return {a,b,ans,opts,correctIdx:opts.indexOf(ans)};
}

// ── Particles ───────────────────────────────────
function spawnParts(x,y,colors,n=12){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.28, sp=2+Math.random()*5;
    const col=colors[Math.random()*colors.length|0];
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,col,r:3+Math.random()*4,life:40+Math.random()*20|0,max:60});
  }
}
function updateParts(){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life--;
    if(p.life<=0) parts.splice(i,1);
  }
}
function drawParts(){
  for(const p of parts){
    cx.globalAlpha=p.life/p.max;
    cx.fillStyle=p.col;
    cx.beginPath(); cx.arc(p.x,p.y,p.r,0,6.28); cx.fill();
  }
  cx.globalAlpha=1;
}

// ── Drawing helpers ──────────────────────────────
function rr(x,y,w,h,r,fill,stroke,sw=2){
  cx.beginPath(); cx.roundRect(x,y,w,h,r);
  if(fill){cx.fillStyle=fill;cx.fill();}
  if(stroke){cx.strokeStyle=stroke;cx.lineWidth=sw;cx.stroke();}
}
function ct(txt,y,fs,col,font,xa){
  cx.save(); cx.fillStyle=col;
  cx.font=`${fs}px ${font||"'Fredoka One',cursive"}`;
  cx.textAlign=xa||'center'; cx.fillText(txt,W/2+(xa?-W/2+20:0),y);
  cx.restore();
}

// ── Sky & Landscape ─────────────────────────────
function drawSky(){
  const sunsetR=Math.min(1,(lv-1)/12);
  const r1=`hsl(${40-sunsetR*20},${90-sunsetR*30}%,${75-sunsetR*30}%)`;
  const r2=`hsl(${20-sunsetR*15},${80-sunsetR*20}%,${45-sunsetR*15}%)`;
  const gr=cx.createLinearGradient(0,0,0,H*0.62);
  gr.addColorStop(0,r1); gr.addColorStop(1,r2);
  cx.fillStyle=gr; cx.fillRect(0,0,W,H*0.62);

  // Sun
  const sunCol=lv>12?'#ff8822':'#FFD700';
  cx.save();
  cx.shadowColor=sunCol; cx.shadowBlur=30;
  cx.fillStyle=sunCol;
  cx.beginPath(); cx.arc(W*0.8,70,32,0,6.28); cx.fill();
  cx.restore();

  // Clouds
  drawCloud(((scroll*0.06+200)%(W+200))-200,48,1.1);
  drawCloud(((scroll*0.04+450)%(W+200))-100,68,0.8);
  drawCloud(((scroll*0.05+700)%(W+200))-200,38,1.3);
}

function drawCloud(x,y,s){
  cx.fillStyle='rgba(255,255,255,0.85)';
  for(const [dx,dy,r] of [[0,0,20],[22,0,26],[46,0,22],[-12,10,18],[60,10,18]]){
    cx.beginPath(); cx.arc(x+dx*s,y+dy*s,r*s,0,6.28); cx.fill();
  }
}

function drawDesert(){
  const gy=H*0.62;
  // Ground gradient
  const gr=cx.createLinearGradient(0,gy,0,H);
  gr.addColorStop(0,'#c8830a'); gr.addColorStop(0.4,'#a06008'); gr.addColorStop(1,'#7a4a04');
  cx.fillStyle=gr; cx.fillRect(0,gy,W,H-gy);

  // Sand texture stripes
  cx.strokeStyle='rgba(0,0,0,0.08)'; cx.lineWidth=1;
  for(let i=0;i<8;i++){
    const sy=gy+20+i*14;
    cx.beginPath(); cx.moveTo(0,sy); cx.lineTo(W,sy+4); cx.stroke();
  }

  // Cacti (parallax)
  for(let i=0;i<5;i++){
    const cx2=((i*180-scroll*0.3+900)%(W+180))-90;
    drawCactus(cx2, gy);
  }

  // Ground rocks
  cx.fillStyle='#7a4a00';
  for(let i=0;i<12;i++){
    const rx=((i*67+scroll*0.7)%(W+60))-30;
    const ry=gy+4+((i*31)%18);
    cx.beginPath(); cx.ellipse(rx,ry,8+i%5,4,0,0,6.28); cx.fill();
  }
}

function drawCactus(x,gy){
  cx.fillStyle='#2d7a2d';
  cx.fillRect(x-7,gy-55,14,55);
  cx.fillRect(x-22,gy-42,15,10); cx.fillRect(x-22,gy-52,10,10);
  cx.fillRect(x+7,gy-38,15,10); cx.fillRect(x+12,gy-48,10,10);
  cx.fillStyle='#1a5a1a';
  cx.fillRect(x-5,gy-55,4,55);
}

// ── Mesa / rocks in background ───────────────────
function drawMesas(){
  const gy=H*0.62;
  cx.fillStyle='#8B4513';
  // Mesa 1
  const mx1=((scroll*0.15+100)%(W+400))-400;
  cx.beginPath(); cx.moveTo(mx1,gy); cx.lineTo(mx1+30,gy-80);
  cx.lineTo(mx1+140,gy-80); cx.lineTo(mx1+170,gy); cx.fill();
  // Mesa 2
  const mx2=((scroll*0.12+500)%(W+400))-200;
  cx.fillStyle='#a0522d';
  cx.beginPath(); cx.moveTo(mx2,gy); cx.lineTo(mx2+20,gy-55);
  cx.lineTo(mx2+110,gy-55); cx.lineTo(mx2+130,gy); cx.fill();
}

// ── Cowboy (from behind) ─────────────────────────
function drawCowboy(x,y){
  const bob=Math.sin(frame*0.14)*2.5;
  const run=gs==='playing'||gs==='question'||gs==='feedback';
  const legSwing=run?Math.sin(frame*0.22)*10:0;

  // Shadow
  cx.fillStyle='rgba(0,0,0,0.25)';
  cx.beginPath(); cx.ellipse(x,y+2,20,5,0,0,6.28); cx.fill();

  // Boots
  cx.fillStyle='#3a1a00';
  cx.fillRect(x-12,y-16+Math.abs(legSwing)*0.3,10,16);
  cx.fillRect(x+2, y-16-Math.abs(legSwing)*0.3,10,16);
  // Boot tips
  cx.fillRect(x-15,y-4,7,5); cx.fillRect(x+8,y-4,7,5);

  // Pants
  cx.fillStyle='#4a3090';
  cx.beginPath();
  cx.moveTo(x-12,y-16); cx.lineTo(x-12,y-44);
  cx.lineTo(x+2, y-44); cx.lineTo(x+2, y-16+legSwing);
  cx.fill();
  cx.beginPath();
  cx.moveTo(x+2, y-44); cx.lineTo(x+12,y-44);
  cx.lineTo(x+12,y-16-legSwing); cx.lineTo(x+2, y-16);
  cx.fill();
  // Belt
  cx.fillStyle='#5a3010'; cx.fillRect(x-12,y-44,24,5);
  cx.fillStyle='#FFD700'; cx.fillRect(x-3,y-45,6,7);// buckle

  // Shirt / vest (back view)
  cx.fillStyle='#c8500a';
  rr(x-12,y-72+bob,24,30,4,'#c8500a');
  // Vest darker stripe
  cx.fillStyle='#8a3800';
  cx.fillRect(x-4,y-72+bob,8,28);

  // Arms with gun hand
  cx.fillStyle='#d4884a'; // skin
  // Left arm
  cx.fillRect(x-18,y-68+bob,7,22);
  // Right arm raised (holding gun up)
  cx.fillRect(x+11,y-72+bob,7,18);
  // Gun
  cx.fillStyle='#222';
  cx.fillRect(x+14,y-82+bob,5,16);
  cx.fillRect(x+10,y-78+bob,12,5);
  // Smoke puff if just fired
  if(feedback.active&&feedback.correct){
    cx.fillStyle='rgba(200,200,200,0.6)';
    cx.beginPath(); cx.arc(x+18,y-85+bob,6+Math.random()*4,0,6.28); cx.fill();
  }

  // Neck / back of head (skin)
  cx.fillStyle='#d4884a';
  cx.fillRect(x-5,y-82+bob,10,14);

  // Hat brim
  cx.fillStyle='#5a2d00';
  rr(x-22,y-90+bob,44,6,2,'#5a2d00');
  // Hat crown
  rr(x-13,y-118+bob,26,30,3,'#6b3500');
  // Hat band
  cx.fillStyle='#FFD700'; cx.fillRect(x-13,y-92+bob,26,5);
  // Hat highlight
  cx.fillStyle='rgba(255,255,255,0.12)';
  cx.fillRect(x-10,y-116+bob,8,20);

  // Star on belt
  cx.fillStyle='#FFD700'; cx.font='10px serif';
  cx.textAlign='center'; cx.fillText('★',x,y-41);
}

// ── Horse ────────────────────────────────────────
function drawHorse(x,y){
  horseAnim+=0.12;
  const laughing = horseLaughing>0;
  // When laughing: faster bounce + mouth open + tears
  const b = laughing
    ? Math.sin(horseAnim*3)*9          // fast shake
    : Math.sin(horseAnim)*5;
  const legA = laughing
    ? Math.sin(horseAnim*3)*25
    : Math.sin(horseAnim)*18;
  if(horseLaughing>0) horseLaughing--;

  // Shadow
  cx.fillStyle='rgba(0,0,0,0.2)';
  cx.beginPath(); cx.ellipse(x,y+5,38,8,0,0,6.28); cx.fill();

  // Tail
  cx.strokeStyle='#6b3a00'; cx.lineWidth=5;
  cx.beginPath(); cx.moveTo(x+48,y-30);
  cx.quadraticCurveTo(x+72,y-10,x+65,y+10); cx.stroke();
  cx.strokeStyle='#8a5000'; cx.lineWidth=2;
  cx.beginPath(); cx.moveTo(x+48,y-30);
  cx.quadraticCurveTo(x+74,y-5,x+66,y+15); cx.stroke();

  // Legs (4)
  cx.fillStyle='#5a3000';
  const legs=[[-28,3,legA],[-12,3,-legA],[8,3,legA],[24,3,-legA]];
  for(const [lx,,la] of legs){
    const ly=y+b;
    cx.save(); cx.translate(x+lx,ly); cx.rotate(la*Math.PI/180);
    cx.fillRect(-4,0,8,28); cx.fillStyle='#3a1a00'; cx.fillRect(-5,24,10,6); cx.restore();
  }

  // Body
  cx.fillStyle='#8B4513';
  cx.beginPath(); cx.ellipse(x,y-16+b,46,22,0.1,0,6.28); cx.fill();
  cx.fillStyle='#a05020';
  cx.beginPath(); cx.ellipse(x-8,y-20+b,38,18,0.05,0,6.28); cx.fill();

  // Neck
  cx.fillStyle='#8B4513';
  cx.beginPath(); cx.moveTo(x-28,y-30+b); cx.lineTo(x-42,y-52+b);
  cx.lineTo(x-34,y-54+b); cx.lineTo(x-18,y-28+b); cx.fill();

  // Head
  cx.fillStyle='#8B4513';
  cx.beginPath(); cx.ellipse(x-52,y-56+b,18,11,0.3,0,6.28); cx.fill();
  // Snout
  cx.fillStyle='#a05020';
  cx.beginPath(); cx.ellipse(x-64,y-52+b,10,7,-0.1,0,6.28); cx.fill();

  if(laughing){
    // Open mouth laughing
    cx.fillStyle='#3a1000';
    cx.beginPath(); cx.ellipse(x-66,y-48+b,7,6,0,0,6.28); cx.fill();
    // Teeth showing
    cx.fillStyle='#fff';
    cx.fillRect(x-71,y-53+b,5,5); cx.fillRect(x-65,y-53+b,5,5);
    // Laugh tears
    cx.fillStyle='rgba(120,200,255,0.9)';
    cx.beginPath(); cx.ellipse(x-44,y-62+b,3,5,0.3,0,6.28); cx.fill();
    cx.beginPath(); cx.ellipse(x-44,y-55+b,2,4,0.2,0,6.28); cx.fill();
    // HA HA text bubble
    cx.save();
    cx.fillStyle='#fff'; cx.font="bold 11px 'Fredoka One',cursive";
    cx.textAlign='center';
    const ha=['HA','HA!','HEE'][Math.floor(horseAnim*2)%3];
    cx.fillText(ha, x-52, y-78+b);
    cx.restore();
  } else {
    // Normal nostril
    cx.fillStyle='#3a1a00'; cx.beginPath(); cx.ellipse(x-68,y-50+b,3,2,0,0,6.28); cx.fill();
  }

  // Eye — squinting/X when laughing
  if(laughing){
    cx.strokeStyle='#1a0a00'; cx.lineWidth=2.5;
    cx.beginPath(); cx.moveTo(x-51,y-63+b); cx.lineTo(x-45,y-57+b); cx.stroke();
    cx.beginPath(); cx.moveTo(x-45,y-63+b); cx.lineTo(x-51,y-57+b); cx.stroke();
  } else {
    cx.fillStyle='#1a0a00'; cx.beginPath(); cx.arc(x-48,y-60+b,3.5,0,6.28); cx.fill();
    cx.fillStyle='#fff'; cx.beginPath(); cx.arc(x-47,y-61+b,1.2,0,6.28); cx.fill();
  }

  // Ear
  cx.fillStyle='#7a3a00'; cx.beginPath();
  cx.moveTo(x-42,y-62+b); cx.lineTo(x-38,y-74+b); cx.lineTo(x-34,y-62+b); cx.fill();
  // Mane
  cx.fillStyle='#5a2a00';
  for(let i=0;i<5;i++){
    const mx=-40+i*3, my=-65-i*2;
    cx.beginPath(); cx.arc(x+mx,y+my+b,5,0,6.28); cx.fill();
  }
  // Bridle
  cx.strokeStyle='#FFD700'; cx.lineWidth=2;
  cx.beginPath(); cx.moveTo(x-58,y-58+b); cx.lineTo(x-44,y-62+b); cx.lineTo(x-40,y-50+b); cx.stroke();
  // Saddle
  cx.fillStyle='#5a2a00';
  cx.beginPath(); cx.ellipse(x-5,y-36+b,18,8,0,0,6.28); cx.fill();
  rr(x-16,y-45+b,22,10,4,'#6b3500');
}

// ── Laugh overlay (big horse in foreground) ───────
const LAUGH_TOTAL = 140; // frames total

function drawLaughOverlay(){
  if(horseLaughing<=0) return;
  const progress = horseLaughing / LAUGH_TOTAL; // 1→0 as it fades

  // Entrance: pop in during first 20 frames (progress > 0.86)
  // Exit: fade out in last 30 frames (progress < 0.22)
  let scale = 1;
  if(progress > 0.86) scale = 1 - (progress - 0.86) / 0.14 * 0.6; // 0.4→1
  else if(progress < 0.22) scale = progress / 0.22;
  const alpha = Math.min(1, progress < 0.22 ? progress/0.22 : 1);

  cx.save();
  // Dark vignette behind horse
  cx.globalAlpha = alpha * 0.72;
  cx.fillStyle = '#000';
  cx.fillRect(0,0,W,H);
  cx.globalAlpha = alpha;

  // Scale around center-bottom of horse
  const hx = W/2, hy = H*0.78;
  cx.translate(hx, hy);
  cx.scale(scale * 2.2, scale * 2.2);   // 2.2× bigger than normal
  cx.translate(-hx, -hy);

  // Draw the laughing horse at center of screen
  drawHorseLarge(hx, hy);

  cx.restore();

  // "¡JA JA JA!" speech bubble — drawn after restore so it stays at screen coords
  if(progress > 0.2){
    const bubbleAlpha = Math.min(1, alpha);
    cx.save();
    cx.globalAlpha = bubbleAlpha;
    const bounce = Math.sin(frame * 0.4) * 6;
    // Bubble
    const bx = W/2 + 90, by = H*0.18 + bounce;
    rr(bx-70, by-28, 140, 46, 14, '#fff', '#FFD700', 3);
    // Tail of bubble
    cx.fillStyle='#fff';
    cx.beginPath(); cx.moveTo(bx-30,by+18); cx.lineTo(bx-60,by+40); cx.lineTo(bx-10,by+18); cx.fill();
    cx.strokeStyle='#FFD700'; cx.lineWidth=2;
    cx.beginPath(); cx.moveTo(bx-30,by+18); cx.lineTo(bx-60,by+40); cx.stroke();
    cx.beginPath(); cx.moveTo(bx-10,by+18); cx.lineTo(bx-60,by+40); cx.stroke();
    // Text cycles: ¡JA! / HA HA / HEE HEE
    const msgs=['¡JA JA!','HA HA!','¡JE JE!'];
    const msg = msgs[Math.floor(frame/18)%3];
    cx.fillStyle='#8B0000';
    cx.font="bold 22px 'Fredoka One',cursive";
    cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillText(msg, bx, by);
    cx.restore();
  }
}

// Separate large horse draw (centered, always laughing)

  const legA = Math.sin(horseAnim * 3) * 25;

  cx.fillStyle='rgba(0,0,0,0.25)';
  cx.beginPath(); cx.ellipse(x, y+5, 38, 8, 0, 0, 6.28); cx.fill();

  // Tail
  cx.strokeStyle='#6b3a00'; cx.lineWidth=5;
  cx.beginPath(); cx.moveTo(x+48,y-30); cx.quadraticCurveTo(x+72,y-10,x+65,y+10); cx.stroke();
  cx.strokeStyle='#8a5000'; cx.lineWidth=2;
  cx.beginPath(); cx.moveTo(x+48,y-30); cx.quadraticCurveTo(x+74,y-5,x+66,y+15); cx.stroke();

  // Legs
  cx.fillStyle='#5a3000';
  for(const [lx,la] of [[-28,legA],[-12,-legA],[8,legA],[24,-legA]]){
    cx.save(); cx.translate(x+lx,y+b); cx.rotate(la*Math.PI/180);
    cx.fillRect(-4,0,8,28); cx.fillStyle='#3a1a00'; cx.fillRect(-5,24,10,6); cx.restore();
  }

  // Body
  cx.fillStyle='#8B4513'; cx.beginPath(); cx.ellipse(x,y-16+b,46,22,0.1,0,6.28); cx.fill();
  cx.fillStyle='#a05020'; cx.beginPath(); cx.ellipse(x-8,y-20+b,38,18,0.05,0,6.28); cx.fill();

  // Neck
  cx.fillStyle='#8B4513';
  cx.beginPath(); cx.moveTo(x-28,y-30+b); cx.lineTo(x-42,y-52+b);
  cx.lineTo(x-34,y-54+b); cx.lineTo(x-18,y-28+b); cx.fill();

  // Head
  cx.fillStyle='#8B4513'; cx.beginPath(); cx.ellipse(x-52,y-56+b,18,11,0.3,0,6.28); cx.fill();
  cx.fillStyle='#a05020'; cx.beginPath(); cx.ellipse(x-64,y-52+b,10,7,-0.1,0,6.28); cx.fill();

  // Open laughing mouth
  cx.fillStyle='#3a1000'; cx.beginPath(); cx.ellipse(x-66,y-48+b,8,7,0,0,6.28); cx.fill();
  cx.fillStyle='#fff'; cx.fillRect(x-72,y-53+b,6,5); cx.fillRect(x-65,y-53+b,6,5);

  // Laugh tears
  cx.fillStyle='rgba(120,200,255,0.95)';
  cx.beginPath(); cx.ellipse(x-44,y-62+b,3,6,0.3,0,6.28); cx.fill();
  cx.beginPath(); cx.ellipse(x-44,y-54+b,2,4,0.2,0,6.28); cx.fill();

  // Eyes squinting (X shape)
  cx.strokeStyle='#1a0a00'; cx.lineWidth=3;
  cx.beginPath(); cx.moveTo(x-52,y-64+b); cx.lineTo(x-44,y-56+b); cx.stroke();
  cx.beginPath(); cx.moveTo(x-44,y-64+b); cx.lineTo(x-52,y-56+b); cx.stroke();

  // Ear
  cx.fillStyle='#7a3a00'; cx.beginPath();
  cx.moveTo(x-42,y-62+b); cx.lineTo(x-38,y-74+b); cx.lineTo(x-34,y-62+b); cx.fill();

  // Mane
  cx.fillStyle='#5a2a00';
  for(let i=0;i<5;i++){ cx.beginPath(); cx.arc(x-40+i*3,y-65-i*2+b,5,0,6.28); cx.fill(); }

  // Bridle
  cx.strokeStyle='#FFD700'; cx.lineWidth=2;
  cx.beginPath(); cx.moveTo(x-58,y-58+b); cx.lineTo(x-44,y-62+b); cx.lineTo(x-40,y-50+b); cx.stroke();

  // Saddle
  cx.fillStyle='#5a2a00'; cx.beginPath(); cx.ellipse(x-5,y-36+b,18,8,0,0,6.28); cx.fill();
  rr(x-16,y-45+b,22,10,4,'#6b3500');
}

// ── Question UI ──────────────────────────────────
function showQuestion(){
  if(!q) return;
  const ui=document.getElementById('ui');
  ui.style.display='flex';
  // Position answers in lower half
  ui.style.justifyContent='flex-end';
  ui.style.paddingBottom='28px';
  ui.style.paddingLeft='0';
  ui.style.paddingRight='0';

  for(let i=0;i<4;i++){
    const btn=document.getElementById('a'+i);
    btn.textContent=q.opts[i];
    btn.className='abtn';
    btn.disabled=false;
  }
}

function hideQuestion(){
  document.getElementById('ui').style.display='none';
}

function handleAnswer(idx){
  if(qAnswered) return;
  qAnswered=true;
  const isOk=idx===q.correctIdx;
  const btn=document.getElementById('a'+idx);
  btn.className='abtn '+(isOk?'correct':'wrong');
  // Disable all
  for(let i=0;i<4;i++) document.getElementById('a'+i).disabled=true;

  if(isOk){
    playSound(true);
    correct++;
    score+=Math.max(30,80+(lv-1)*8);
    spawnParts(W/2,160,['#FFD700','#ff4','#fff','#ffaa44'],20);
    spawnParts(165,210,['#FFD700','#ff4','#fff'],8);
  } else {
    playSound(false);
    levelWrong++;
    lives--;
    horseLaughing = LAUGH_TOTAL; // big laugh overlay
    // Highlight correct
    document.getElementById('a'+q.correctIdx).className='abtn correct';
  }

  feedback={active:true,correct:isOk,timer:80,chosen:idx};
  gs='feedback';
}

// ── Message overlay ──────────────────────────────
function showMsg(title,sub,btn,cb){
  const ov=document.getElementById('msgOverlay');
  document.getElementById('msgTitle').textContent=title;
  document.getElementById('msgSub').textContent=sub;
  document.getElementById('msgBtn').textContent=btn;
  ov.style.display='flex';
  document.getElementById('msgBtn').onclick=()=>{
    ov.style.display='none'; cb();
  };
}
function hideMsg(){ document.getElementById('msgOverlay').style.display='none'; }

// ── Audio ─────────────────────────────────────────
let ac=null;
function getAC(){ if(!ac) ac=new(window.AudioContext||window.webkitAudioContext)(); return ac; }
function playSound(ok){
  try{
    const a=getAC();
    if(ok){
      [440,554,659,880].forEach((f,i)=>{
        const o=a.createOscillator(),g=a.createGain();
        o.connect(g); g.connect(a.destination);
        o.frequency.value=f; o.type='triangle';
        const t=a.currentTime+i*0.07;
        g.gain.setValueAtTime(0.08,t); g.gain.linearRampToValueAtTime(0,t+0.12);
        o.start(t); o.stop(t+0.14);
      });
    } else {
      const o=a.createOscillator(),g=a.createGain();
      o.connect(g); g.connect(a.destination);
      o.frequency.setValueAtTime(300,a.currentTime);
      o.frequency.linearRampToValueAtTime(80,a.currentTime+0.4);
      o.type='sawtooth';
      g.gain.setValueAtTime(0.1,a.currentTime); g.gain.linearRampToValueAtTime(0,a.currentTime+0.4);
      o.start(); o.stop(a.currentTime+0.42);
    }
  }catch(e){}
}

// ── Level flow ────────────────────────────────────
function startGame(){
  lv=1; lives=3; score=0; correct=0; levelWrong=0; lastWrong=0; parts=[];
  frame=0; scroll=0; horseLaughing=0; gs='playing';
  nextQuestion();
  updateTableInfo();
}

function nextQuestion(){
  q=mkQ(lv); qAnswered=false;
  gs='question';
  showQuestion();
}

function nextLevel(){
  lastWrong=levelWrong; levelWrong=0; correct=0;
  lv++;
  if(lv>20){ gs='win'; hideQuestion(); return; }
  parts=[];
  gs='playing';
  nextQuestion();
  updateTableInfo();
}

function updateTableInfo(){
  const t=getTables(lv);
  document.getElementById('tinfo').textContent=
    'Tablas activas: '+t.map(n=>'× '+n).join('  ');
}

// ── Update ────────────────────────────────────────
function update(){
  frame++;
  if(gs==='playing'||gs==='question'||gs==='feedback') scroll+=1.2;
  else scroll+=0.3;
  updateParts();

  if(gs==='feedback'){
    feedback.timer--;
    if(feedback.timer<=0){
      feedback.active=false;
      hideQuestion();
      if(lives<=0){ gs='gameOver'; return; }
      if(correct>=NEED){
        // Level done
        const stars=levelWrong===0?'⭐⭐⭐':levelWrong<=2?'⭐⭐':'⭐';
        showMsg(
          lv>=20?'¡ÚLTIMO NIVEL!':'¡NIVEL SUPERADO!',
          `${stars}\n¡Bien hecho, cowboy!\nPuntuacion: ${score}`,
          lv>=20?'¡Al final!':'¡Siguiente nivel! →',
          nextLevel
        );
        gs='levelDone';
      } else {
        nextQuestion();
      }
    }
  }
}

// ── Render ────────────────────────────────────────
function render(){
  cx.clearRect(0,0,W,H);
  cx.textAlign='left';
  if(gs==='start')    { drawStart(); }
  else if(gs==='gameOver') { drawGameOver(); }
  else if(gs==='win')      { drawWin(); }
  else { drawPlaying(); }
  // Always draw laugh overlay on top if active
  drawLaughOverlay();
}

// ── Controls ──────────────────────────────────────
function globalAction(){
  if(gs==='start')   { startGame(); return; }
  if(gs==='gameOver'||gs==='win') { startGame(); return; }
}

cv.addEventListener('click', globalAction);
document.addEventListener('keydown', e=>{
  if(e.code==='Space'){ e.preventDefault(); globalAction(); }
  if(e.code==='Escape'){
    if(gs!=='start'){
      // Cancel any active overlays
      hideQuestion();
      hideMsg();
      parts=[];
      gs='start';
    }
  }
});

for(let i=0;i<4;i++){
  document.getElementById('a'+i).addEventListener('click',()=>handleAnswer(i));
}

// ── Loop ──────────────────────────────────────────
(function loop(){ update(); render(); requestAnimationFrame(loop); })();
</script>
